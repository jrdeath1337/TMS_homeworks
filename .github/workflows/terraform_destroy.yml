name: Terraform Destroy

on:
  workflow_dispatch:    # ручной запуск из интерфейса GitHub

env:
  TF_VERSION: 1.6.6

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: production   # запросит ручное подтверждение
    defaults:
      run:
        working-directory: terraform_1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - name: Terraform Destroy
        env:
          YC_TOKEN: ${{ secrets.YC_TOKEN }}
        run: |
          terraform destroy -auto-approve \
            -var="folder_id=${{ secrets.YC_FOLDER_ID }}" \
            -var="ssh_public_key=${{ vars.SSH_PUBLIC_KEY }}"
