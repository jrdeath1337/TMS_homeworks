services:
  db:
    build: ./postgres 
    ports:
      - "5433:5432"
  web:
    build: ./nginx 
    ports: 
      - "81:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf/index.html:/usr/share/nginx/html/index.html   
    links:
      - db 
    depends_on:
      - db
