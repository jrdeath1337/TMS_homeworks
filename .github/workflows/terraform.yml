name: Terraform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  TF_VERSION: 1.6.6

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform_1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: terraform validate
      - run: terraform fmt -check

  plan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform_1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - run: |
          terraform plan -out=plan.tfplan \
            -var="folder_id=${{ secrets.YC_FOLDER_ID }}" \
            -var="ssh_public_key=${{ vars.SSH_PUBLIC_KEY }}"
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform_1/plan.tfplan

  apply:
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform_1
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
      - name: Terraform Apply
        env:
          YC_TOKEN: ${{ secrets.YC_TOKEN }}
        run: |
          if [ -z "${{ secrets.YC_FOLDER_ID }}" ]; then echo "ERROR: YC_FOLDER_ID secret is empty"; exit 1; fi
          if [ -z "${{ vars.SSH_PUBLIC_KEY }}" ]; then echo "ERROR: SSH_PUBLIC_KEY variable is empty"; exit 1; fi
          terraform apply -auto-approve \
          -var="folder_id=${{ secrets.YC_FOLDER_ID }}" \
          -var="ssh_public_key=${{ vars.SSH_PUBLIC_KEY }}"
